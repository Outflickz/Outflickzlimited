[build]
  publish = "."
  functions = "netlify/functions"

# 1. API Redirection
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# 2. Pretty URLs (Clean Routing)
# This allows users to go to /products/wears instead of /products/wears.html
[[redirects]]
  from = "/products/*"
  to = "/products/:splat.html"
  status = 200

[[redirects]]
  from = "/pages/*"
  to = "/pages/:splat.html"
  status = 200

[[redirects]]
  from = "/account/*"
  to = "/account/:splat.html"
  status = 200

# 3. GLOBAL HEADERS (Security & CORS)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["mongodb", "bcryptjs", "jsonwebtoken", "nodemailer", "aws-sdk"]