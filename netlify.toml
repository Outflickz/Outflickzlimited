[build]
  publish = "."
  functions = "netlify/functions"

# 1. API Redirection
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# 2. Pretty URLs (Clean Routing)
[[redirects]]
  from = "/products/*"
  to = "/products/:splat.html"
  status = 200

[[redirects]]
  from = "/pages/*"
  to = "/pages/:splat.html"
  status = 200

[[redirects]]
  from = "/account/*"
  to = "/account/:splat.html"
  status = 200

# 3. GLOBAL HEADERS (Security & CORS)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"

# 4. VIDEO STREAMING OPTIMIZATION
# This fixes the ERR_CACHE_OPERATION_NOT_SUPPORTED by enabling Byte Range requests
[[headers]]
  for = "/*.mp4"
  [headers.values]
    Content-Type = "video/mp4"
    Accept-Ranges = "bytes"
    Cache-Control = "public, max-age=31536000, must-revalidate"

# 5. IMAGE CDN CONFIGURATION
[images]
  remote_images = [
    "https://outflickz\\.netlify\\.app/.*",   # Authorize your own domain
    "https://outflickz\\.com/.*",              # Authorize custom domain if active
    "https://s3\\.us-west-1\\.idrivee2\\.com/.*",
    "https://.*\\.amazonaws\\.com/.*" 
  ]

# 6. FUNCTIONS CONFIGURATION
[functions]
  node_bundler = "esbuild"
  # Optimization: Use @aws-sdk/client-s3 instead of 'aws-sdk' if possible to reduce bundle size.
  # Added 'resend' or 'canvas' if you use them, otherwise kept your list.
  external_node_modules = ["mongodb", "bcryptjs", "jsonwebtoken", "nodemailer"]
  # Use included_files to make sure any local assets/templates for emails are found
  included_files = ["netlify/functions/templates/**"]